<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Slm-neo Browser Playground</title>
	<style>
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			margin: 0;
			padding: 0;
			background: #f4f7f9;
			color: #333;
			height: 100vh;
			display: flex;
			flex-direction: column;
		}

		header {
			background: #2c3e50;
			color: white;
			padding: 1rem 2rem;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		header h1 {
			margin: 0;
			font-size: 1.5rem;
		}

		.container {
			display: flex;
			flex: 1;
			overflow: hidden;
		}

		.editor,
		.preview {
			flex: 1;
			display: flex;
			flex-direction: column;
			padding: 20px;
			box-sizing: border-box;
		}

		.editor {
			border-right: 1px solid #ddd;
			background: #fff;
		}

		.preview {
			background: #fdfdfd;
		}

		h2 {
			font-size: 0.9rem;
			color: #7f8c8d;
			margin-bottom: 10px;
			letter-spacing: 1px;
		}

		textarea {
			flex: 1;
			width: 100%;
			font-family: "SF Mono", "Monaco", "Inconsolata", monospace;
			font-size: 14px;
			border: 1px solid #e0e6ed;
			border-radius: 4px;
			padding: 15px;
			outline: none;
			background: #fcfcfc;
			resize: none;
			transition: border 0.3s ease;
		}

		textarea:focus {
			border-color: #3498db;
			box-shadow: 0 0 5px rgba(52, 152, 219, 0.2);
		}

		#output {
			flex: 1;
			padding: 15px;
			background: white;
			border: 1px solid #e0e6ed;
			border-radius: 4px;
			overflow: auto;
			white-space: pre-wrap;
			font-family: monospace;
			font-size: 14px;
			color: #2c3e50;
		}

		.error {
			color: #e74c3c;
			background: #fdeaea;
			border-color: #fadbd8;
		}

		.footer {
			padding: 10px 20px;
			font-size: 0.8rem;
			color: #95a5a6;
			border-top: 1px solid #ddd;
			background: #fff;
		}
	</style>
</head>

<body>
	<header>
		<h1>Slm-neo Playground</h1>
		<div style="font-size: 0.8rem; opacity: 0.8;">v0.1.0</div>
	</header>

	<div class="container">
		<div class="editor">
			<h2>INPUT (Slm)</h2>
			<textarea id="input" placeholder="p Write slm here...&#10;h1 Hello ${this.name}">h1 Hello ${this.name}
p Slm-neo is a modern template language.
- if (this.showDetails)
  p(style="color: blue") Detailed content shows here!
- for (let i = 0; i < 3; i++)
  li Item ${i+1}</textarea>
		</div>
		<div class="preview">
			<h2>OUTPUT (HTML)</h2>
			<pre id="output"></pre>
		</div>
	</div>

	<div class="footer">
		Automatic rendering every 300ms. Context: <code>{ name: "User", showDetails: true }</code>
	</div>

	<!-- Script path is now relative to playground/ -->
	<script src="dist/slm-browser.js"></script>
	<script>
		var input = document.getElementById("input");
		var output = document.getElementById("output");
		var options = { filename: "playground.slm" };
		var model = { name: "User", showDetails: true };
		var oldContent = "";

		function render() {
			var content = input.value;
			if (content === oldContent) return;
			oldContent = content;

			try {
				var html = Slm.render(content, model, options);
				// Insert newline between tags for better readability
				html = html.replace(/></g, ">\n<");
				output.textContent = html;
				output.classList.remove('error');
			} catch (e) {
				output.textContent = "Error: " + e.message;
				output.classList.add('error');
			}
		}

		input.addEventListener('input', render);
		render(); // Initial render
	</script>
</body>

</html>
